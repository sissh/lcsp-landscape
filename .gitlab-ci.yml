stages:
  - scan

gitleaks:
  stage: scan
  tags:
    - cicd-scan
  variables:
    GIT_DEPTH: 0
  script:
    - gitleaks dir --redact --no-banner \
      --report-format json --report-path gitleaks-report.json --exit-code 1
  after_script:
    - test -f gitleaks-report.json || echo '{}' > gitleaks-report.json
  artifacts:
    when: always
    paths:
      - gitleaks-report.json

