stages:
  - configure
  - build
  - deploy

variables:
  ZABBIX_SERVER: "192.168.60.10"
  ZABBIX_METADATA: "linux gitlab-runner"
  OUTPUT_LANDSCAPE: "/home/gitlab-runner/output_landscape"

default:
  before_script:
    # Debian n'ajoute pas forcément /usr/sbin au PATH de gitlab-runner.
    - export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
    - echo "Utilisateur du job : $(whoami)"
    - echo "Machine : $(hostname)"
    - echo "PATH=${PATH}"

configure-zabbix-agent:
  stage: configure

  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: manual
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
    - when: never

  script:
    - |
      set -euo pipefail

      echo "Configuration de Zabbix Agent 2 sur $(hostname)"

      echo "Vérification de sudo"
      command -v sudo
      sudo -n true

      if ! command -v zabbix_agent2 >/dev/null 2>&1; then
        echo "Installation de Zabbix Agent 2"

        sudo -n apt-get update

        sudo -n env DEBIAN_FRONTEND=noninteractive \
          apt-get install -y zabbix-agent2
      else
        echo "Zabbix Agent 2 est déjà installé : $(command -v zabbix_agent2)"
      fi

      echo "Création des répertoires Zabbix"

      sudo -n mkdir -p \
        /etc/zabbix \
        /etc/zabbix/zabbix_agent2.d \
        /etc/zabbix/zabbix_agent2.d/plugins.d

      echo "Écriture de la configuration"

      sudo -n tee /etc/zabbix/zabbix_agent2.conf >/dev/null <<EOF
      PidFile=/run/zabbix/zabbix_agent2.pid
      LogFile=/var/log/zabbix/zabbix_agent2.log
      LogFileSize=0

      Server=${ZABBIX_SERVER}
      ServerActive=${ZABBIX_SERVER}

      ListenPort=10050
      HostnameItem=system.hostname
      HostMetadata=${ZABBIX_METADATA}
      ForceActiveChecksOnStart=1

      PluginSocket=/run/zabbix/agent.plugin.sock
      ControlSocket=/run/zabbix/agent.sock

      Include=/etc/zabbix/zabbix_agent2.d/plugins.d/*.conf
      Include=/etc/zabbix/zabbix_agent2.d/*.conf
      EOF

      sudo -n chown root:zabbix /etc/zabbix/zabbix_agent2.conf
      sudo -n chmod 640 /etc/zabbix/zabbix_agent2.conf

      echo "Emplacement de l'agent : $(command -v zabbix_agent2)"

      echo "Validation de la configuration"

      sudo -n "$(command -v zabbix_agent2)" \
        -T \
        -c /etc/zabbix/zabbix_agent2.conf

      echo "Activation et redémarrage de l'agent"

      sudo -n systemctl enable zabbix-agent2
      sudo -n systemctl restart zabbix-agent2
      sudo -n systemctl is-active --quiet zabbix-agent2

      echo "Hostname communiqué à Zabbix :"

      sudo -n "$(command -v zabbix_agent2)" \
        -t system.hostname \
        -c /etc/zabbix/zabbix_agent2.conf

      echo "État du service :"

      sudo -n systemctl status zabbix-agent2 \
        --no-pager \
        --lines=10

      echo "Zabbix Agent 2 est actif sur $(hostname)"

build-job:
  stage: build

  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - when: never

  script:
    - |
      set -euo pipefail

      echo "Vérification de landscape2"
      command -v landscape2

      echo "Nettoyage du précédent résultat"
      rm -rf "${OUTPUT_LANDSCAPE}"
      mkdir -p "${OUTPUT_LANDSCAPE}"

      echo "Construction du Landscape"

      landscape2 build \
        --data-file "${CI_PROJECT_DIR}/landscape.yml" \
        --settings-file "${CI_PROJECT_DIR}/settings.yml" \
        --logos-path "${CI_PROJECT_DIR}/hosted_logos" \
        --output-dir "${OUTPUT_LANDSCAPE}"

      echo "Construction terminée dans ${OUTPUT_LANDSCAPE}"

deploy-prod:
  stage: deploy

  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - when: never

  script:
    - |
      set -euo pipefail

      sudo -n true

      if [ ! -d "${OUTPUT_LANDSCAPE}" ]; then
        echo "ERREUR : le répertoire ${OUTPUT_LANDSCAPE} n'existe pas."
        exit 1
      fi

      echo "Déploiement vers /var/www/html"

      sudo -n mkdir -p /var/www/html
      sudo -n cp -a "${OUTPUT_LANDSCAPE}/." /var/www/html/

      echo "Déploiement terminé"

  environment:
    name: production